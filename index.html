};

function getModuleIcon(category, title) {
    if (title.includes("Cloth") || title.includes("Marvelous")) return ICONS.shirt;
    if (title.includes("Anatomy")) return ICONS.user;
    if (title.includes("Scan")) return ICONS.scanFace;
    if (title.includes("IA")) return ICONS.cpu;
    switch (category) {
        case 'modeling': return ICONS.box;
        case 'texturing': return ICONS.palette;
        case 'workflow': return ICONS.repeat;
        case 'specialized': return ICONS.layers;
        case 'career': return ICONS.briefcase;
        default: return ICONS.box;
    }
}

function selectModule(id) {
    activeModuleId = id;
    renderModuleList();
    renderModuleDetail();
    // Scroll the selected module into view in the sidebar
    const idx = COURSE_DATA.findIndex(m => m.id === id);
    const list = document.getElementById('module-list');
    if (list && list.children[idx]) list.children[idx].scrollIntoView({block:'nearest',behavior:'smooth'});
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

}

(function applySiteSettings(){
    const s=SITE_SETTINGS;
    const t=document.getElementById('nav-title');
    const st=document.getElementById('nav-subtitle');
    const b=document.getElementById('nav-badge');
    if(t&&s.siteTitle) t.textContent=s.siteTitle;
    if(st&&s.siteSubtitle) st.textContent=s.siteSubtitle;
    if(b&&s.siteBadge) b.textContent=s.siteBadge;
    if(s.siteTitle) document.title=s.siteTitle+' - Programme de Cours';
    renderNavPages();
    renderPageModals();
})();
renderModuleList();
renderModuleDetail();

// ═══ GALERIE ═══════════════════════════════════════════════════════════════
function openGallery(moduleId) {
    const m = COURSE_DATA.find(mod => mod.id === moduleId);
    if (!m || !m.rendus) return;
    const grid = document.getElementById('galleryGrid');
    document.getElementById('galleryTitle').textContent = 'Rendu Étudiants — ' + m.title;
    grid.innerHTML = m.rendus.map(r => {
        const safe = r.image.replace(/'/g, "\\'");
        return `<div onclick="openLightbox('${safe}')" style="width:200px;cursor:pointer;flex:0 0 200px;">
            <div style="width:200px;height:200px;overflow:hidden;border-radius:12px;border:1px solid rgba(207,168,72,0.3);background:#eaddcf;">
                <img src="${r.image}" alt="${r.student}" style="width:100%;height:100%;object-fit:cover;transition:transform .3s;${r.panX||r.panY||r.zoom?`object-position:calc(50% + ${r.panX||0}px) calc(50% + ${r.panY||0}px);transform:scale(${r.zoom||1});transform-origin:center center;`:''}"
                    onmouseover="this.style.transform='scale(${((r.zoom||1)*1.07).toFixed(2)})'" onmouseout="this.style.transform='scale(${r.zoom||1})'">
            </div>
            <p style="margin-top:8px;text-align:center;font-size:13px;color:rgba(248,241,224,0.8);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${r.student}</p>
        </div>`;
    }).join('');
    document.getElementById('galleryModal').style.display = 'block';
    document.body.style.overflow = 'hidden';
    // Utilise le hash URL — fonctionne sur http:// ET file://
    window.location.hash = 'gallery';
}

function closeGallery() {
    document.getElementById('galleryModal').style.display = 'none';
    document.body.style.overflow = '';
    // Retire le hash sans recharger la page
    if (window.location.hash === '#gallery') {
        history.replaceState(null, '', window.location.pathname + window.location.search);
    }
}

// Bouton retour navigateur : ferme la galerie
window.addEventListener('hashchange', function() {
    if (window.location.hash !== '#gallery') {
        const modal = document.getElementById('galleryModal');
        if (modal && modal.style.display !== 'none') {
            modal.style.display = 'none';
            document.body.style.overflow = '';
        }
    }
});

// Touche Échap
document.addEventListener('keydown', function(e) {
    if (e.key !== 'Escape') return;
    const lightbox = document.getElementById('lightboxModal');
    if (lightbox && !lightbox.classList.contains('hidden')) {
        lightbox.classList.add('hidden');
        document.body.style.overflow = '';
        return;
    }
    const gallery = document.getElementById('galleryModal');
    if (gallery && gallery.style.display !== 'none') closeGallery();
});

// Lightbox functions
function openLightbox(imageSrc) {
    const lightbox = document.getElementById('lightboxModal');
    const lightboxImage = document.getElementById('lightboxImage');
    lightboxImage.src = imageSrc;
    lightbox.classList.remove('hidden');
    document.body.style.overflow = 'hidden'; // Prevent scrolling
}

function closeLightbox(event) {
    event.stopPropagation();
    const lightbox = document.getElementById('lightboxModal');
    lightbox.classList.add('hidden');
    document.body.style.overflow = ''; // Restore scrolling
}

// Prevent closing when clicking on the image
document.addEventListener('DOMContentLoaded', () => {
    const lightboxImage = document.getElementById('lightboxImage');
    if (lightboxImage) {
        lightboxImage.addEventListener('click', (e) => {
            e.stopPropagation();
        });
    }
});
</script>
